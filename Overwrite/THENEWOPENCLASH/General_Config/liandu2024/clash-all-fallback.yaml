# OpenClash 覆写模块 - clash-all-fallback.yaml
# 生成日期：2026-04-08
# 源文件地址：https://raw.githubusercontent.com/ChiaoYenta/THE_HNERYCHIAO_MIHOMO_YAMLS/main/THEYAMLS/General_Config/liandu2024/clash-all-fallback.yaml
# 格式：新版 OpenClash 覆写模块（[YAML] 块覆写）
#
# 本文件只包含 [YAML] 块覆写内容。
# 所有覆写内容默认全部注释，加载后不影响你的任何现有配置。
# 按需找到对应内容，取消注释即可启用。

# ==========================================================
# 【YAML 块覆写区域】
# [YAML] 是新版 OpenClash 的识别标记，这一行本身不可注释。
# 所有覆写内容写在 [YAML] 之后，注释状态不生效，取消注释才生效。
# ==========================================================
[YAML]

# ==========================================================
# 【YAML 块覆写操作符速查表】
# ----------------------------------------------------------
# 操作符    作用
# ----------------------------------------------------------
#  key      默认合并：Hash 类型递归合并（子键不存在则新增），
#           其他类型（字符串、数字等）直接覆盖原值。
#
#  key!     强制覆盖：不管原来是什么，整个值全部替换。
#           常用于替换整个数组或整个子配置块。
#
#  key+     数组后置追加：把新元素加到数组末尾。
#           原数组不变，只在结尾增加内容。
#
#  +key     数组前置插入：把新元素加到数组开头。
#           常用于让自定义规则优先于原有规则生效。
#
#  key-     数组差集删除：从数组中移除指定元素。
#           若目标不是数组，则直接删除该键。
#
#  key*     批量条件更新：配合 where/set 子句，
#           在数组/Hash 中找到匹配的元素后批量修改。
#
#  <key>后缀   同上所有操作符，用于键名本身含有特殊字符（如 . - /）时。
#  +<key>      数组前置插入的 <> 写法。
# ==========================================================

# ==========================================================
# 【proxy-providers 订阅 URL 替换】
# ----------------------------------------------------------
# 作用：把配置文件里某个 proxy-provider 的订阅链接换成你自己的。
#
# 步骤：
#   1. 在下方找到对应 provider 的名称（name: xxx）
#   2. 把下面示例里的 name: 改成那个名称
#   3. 把 url: 后面的地址换成你的订阅链接
#   4. 删除这几行前面的 # 号，保存即可生效
#
# 示例（把名为"机场A"的 provider 订阅链接替换为新链接）：
#
# proxy-providers*:
#   where:
#     name: '机场A'
#   set:
#     url: 'https://你的订阅链接'
#
# 如果有多个 provider 需要替换，复制多段即可：
#
# proxy-providers*:
#   where:
#     name: '机场B'
#   set:
#     url: 'https://你的第二个订阅链接'
#
# ⚠️  注意：proxy-providers 原始内容已在本文件末尾完整复制并注释，
#       可直接对照查看各 provider 的名称和原有配置内容。
# ==========================================================

# ==========================================================
# 【1. 默认合并】key: value
# ----------------------------------------------------------
# 作用：修改或新增配置中的某个字段。
#       Hash 类型时递归合并（只改指定字段，其余字段保留）。
#       非 Hash 类型时直接覆盖原值。
# ----------------------------------------------------------
# 示例：开启 allow-lan 并修改混合端口
# allow-lan: true
# mixed-port: 7893
#
# 示例：只修改 dns 中的两个字段，其余 dns 字段保持不变
# dns:
#   enable: true
#   cache-algorithm: lru
#
# 示例：合并修改 tun 配置（只改指定字段，其余保留）
# tun:
#   enable: true
#   stack: gvisor
# ==========================================================

# ==========================================================
# 【2. 强制覆盖】key!: value
# ----------------------------------------------------------
# 作用：整个替换，不做任何合并。
#       常用于替换整个规则列表、整个 dns 块等。
# ----------------------------------------------------------
# 示例：强制替换整个 rules 数组（原有规则全部丢弃）
# rules!:
#   - DOMAIN-SUFFIX,example.com,DIRECT
#   - MATCH,PROXY
#
# 示例：强制替换 dns 里的 fake-ip-filter 数组
# dns:
#   fake-ip-filter!:
#     - '*.lan'
#     - 'my.custom.domain'
#
# 示例：强制替换整个 dns 块（完全自定义 DNS 配置）
# dns!:
#   enable: true
#   nameserver:
#     - '223.5.5.5'
#     - '119.29.29.29'
# ==========================================================

# ==========================================================
# 【3. 数组后置追加】key+: [...]
# ----------------------------------------------------------
# 作用：在已有数组末尾追加新元素，原有内容不变。
#       常用于在规则末尾追加自定义规则。
# ----------------------------------------------------------
# 示例：向 rules 末尾追加两条规则
# rules+:
#   - DOMAIN-SUFFIX,example.com,DIRECT
#   - IP-CIDR,192.168.0.0/16,DIRECT
#
# 示例：向 dns.nameserver 末尾追加 DNS 服务器
# dns:
#   nameserver+:
#     - '1.1.1.1'
#     - '8.8.8.8'
# ==========================================================

# ==========================================================
# 【4. 数组前置插入】+key: [...]
# ----------------------------------------------------------
# 作用：在已有数组开头插入新元素（规则越靠前越先生效）。
#       常用于让自定义规则优先于原有规则匹配。
# ----------------------------------------------------------
# 示例：向 rules 开头插入高优先级规则
# +rules:
#   - DOMAIN-SUFFIX,priority.com,DIRECT
#   - DOMAIN,my.local,DIRECT
#
# 示例：向 dns.nameserver 开头插入首选 DNS
# dns:
#   +nameserver:
#     - '223.5.5.5'
# ==========================================================

# ==========================================================
# 【5. 数组差集删除】key-: [...]
# ----------------------------------------------------------
# 作用：从数组中移除指定元素；若目标不是数组，则删除整个键。
# ----------------------------------------------------------
# 示例：从 dns.nameserver 中移除不需要的 DNS
# dns:
#   nameserver-:
#     - '8.8.8.8'
#     - '8.8.4.4'
#
# 示例：从 rules 中删除某条规则
# rules-:
#   - DOMAIN-SUFFIX,old.com,REJECT
#
# 示例：删除整个键（值留空）
# dns:
#   cache-algorithm-:
# ==========================================================

# ==========================================================
# 【6. 批量条件更新】key*: where/set
# ----------------------------------------------------------
# 作用：在数组或 Hash 中，按条件找到匹配项后批量修改。
#       where 写匹配条件，set 写要修改的内容（支持上述所有操作符）。
# ----------------------------------------------------------
# where 支持的条件类型：
#   name: 'xxx'        精确匹配 name 字段等于 xxx
#   name: '/^HK/'      用正则表达式匹配（以 /.../ 包裹）
#   type: url-test     匹配 type 字段
#   proxies: ['x']     匹配 proxies 数组中包含指定元素的项
#   key: 'xxx'         用于 Hash 集合，匹配键名
#   value: 'xxx'       用于字符串数组，匹配字符串值
# ----------------------------------------------------------
# 示例：给所有 url-test 类型策略组的 proxies 末尾追加节点
# proxy-groups*:
#   where:
#     type: url-test
#   set:
#     proxies+:
#       - '我的自定义节点'
#
# 示例：用正则匹配名称含 HK 的策略组，在 proxies 开头插入节点
# proxy-groups*:
#   where:
#     name: '/^HK/'
#   set:
#     +proxies:
#       - '香港专线'
#
# 示例：给名为"手动选择"的策略组追加节点
# proxy-groups*:
#   where:
#     name: '手动选择'
#   set:
#     proxies+:
#       - '我的节点名'
#
# 示例：修改所有 socks5 类型节点的端口
# proxies*:
#   where:
#     type: socks5
#   set:
#     port: 1080
#
# 示例：删除规则列表中所有以 REJECT 结尾的规则
# rules*:
#   where:
#     value: '/,REJECT$/'
#   set:
#     value: ~
# ==========================================================

# ==========================================================
# 【7. <key> 语法（键名含特殊字符时使用）】
# ----------------------------------------------------------
# 当键名包含 . - / 等特殊字符时，用 <key> 包裹键名。
# 后缀支持：+ - ! *
# 前置插入写法：+<key>
# ----------------------------------------------------------
# 示例：强制覆盖键名含特殊字符的字段
# <dns>!:
#   enable: false
#
# 示例：后置追加
# dns:
#   <nameserver>+:
#     - '8.8.8.8'
#
# 示例：前置插入
# dns:
#   +<nameserver>:
#     - '119.29.29.29'
#
# 示例：批量条件更新
# <proxy-groups>*:
#   where:
#     type: url-test
#   set:
#     interval: 300
# ==========================================================

# ==========================================================
# 【8. 组合操作】同一个块内可同时写多个操作符
# ----------------------------------------------------------
# 示例：同时删除旧 DNS 并前置插入新 DNS
# dns:
#   nameserver-:
#     - '8.8.8.8'
#   +nameserver:
#     - '223.5.5.5'
#
# 示例：同时前置和后置追加
# dns:
#   +nameserver:
#     - '119.29.29.29'
#   nameserver+:
#     - '1.0.0.1'
# ==========================================================""

# ==========================================================
# 【proxy-providers 原始配置（从源文件直接复制，全部注释）】
# ----------------------------------------------------------
# 以下内容原样复制自源 YAML 的 proxy-providers 块，
# 全部注释，不会对你的配置产生任何影响。
#
# 使用方法：
#   在上方【proxy-providers 订阅 URL 替换】示例中，
#   对照下方的 provider 名称（name: xxx），
#   填写对应名称和你的订阅链接，取消注释后即可生效。
# ==========================================================

# --- provider: 机场名称 ---
# 机场名称:
#   health-check:
#     enable: true
#     interval: 300
